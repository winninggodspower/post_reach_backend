exclude: "^docs/|/migrations/"
default_stages: [pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0  # 🌟 Updated
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 24.4.2  # 🌟 Updated to handle modern Python AST
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2  # 🌟 Updated
    hooks:
      - id: isort

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.16.0  # 🌟 Updated to fix the ast.Str crash
    hooks:
      - id: pyupgrade
        args: [--py311-plus]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.23
    hooks:
      - id: pip-compile
        args: [pyproject.toml, -o, requirements.txt]
        stages: [pre-push]
        files: ^pyproject\.toml$

  - repo: local
    hooks:
      - id: uv-compile-and-commit
        name: Auto-stage all modified files and commit
        entry: >
          cmd.exe /c "
          git diff --quiet || (
            git add -u &&
            git commit -m 'fix: linting check'
          )
          "
        language: system
        pass_filenames: false
        always_run: true
