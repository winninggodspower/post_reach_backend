services:
  redis:
    image: "redis-stack:alpine"
    ports:
      - "6379:6379"
      - "8001:8001"
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: post_reach
      POSTGRES_USER: post_reach_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "post_reach_user"]
      interval: 10s
      timeout: 5s
      retries: 5
